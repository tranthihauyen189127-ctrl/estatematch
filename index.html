<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EstateMatch — Tư vấn an cư & đầu tư</title>

<!-- ============================================================
     LINK CỐ ĐỊNH CHO KHÁCH HÀNG (GitHub Pages)
     ------------------------------------------------------------
     Trang này BỌC website Apps Script trong iframe, nên thanh
     địa chỉ LUÔN giữ nguyên link github.io — khách không thấy
     link Apps Script.

     Khi deploy bản Apps Script mới, CHỈ CẦN sửa 1 dòng
     APPS_SCRIPT_URL bên dưới. Link khách vẫn giữ nguyên.
     ============================================================ -->
<script>
  // 👉 DÁN URL WEB APP APPS SCRIPT CỦA BẠN VÀO ĐÂY (dạng .../exec)
  var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWlG6XLpdwNYHj0XX2F8JTheIE0nK0_HQ89X7IvvN_nrqiFzX4tx9y9UXjGb2Cl2sb/exec";
</script>

<style>
  html,body{margin:0;padding:0;height:100%;background:#eef3e6}
  #app-frame{
    position:fixed;top:0;left:0;
    width:100%;height:100%;
    border:0;
  }
  /* màn hình chờ trong lúc iframe tải */
  #loader{
    position:fixed;inset:0;z-index:1;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#e8f0dc 0%,#f2ecd6 55%,#f6eccb 100%);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#0f3d29;
    transition:opacity .4s ease;
  }
  #loader.hide{opacity:0;pointer-events:none}
  .ring{width:38px;height:38px;border:3px solid rgba(15,61,41,.15);
    border-top-color:#1d9e75;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 14px}
  @keyframes s{to{transform:rotate(360deg)}}
  #loader p{font-size:14px;color:#4a5a4f;text-align:center}
</style>
</head>
<body>
  <div id="loader">
    <div>
      <div class="ring"></div>
      <p>Đang tải EstateMatch...</p>
    </div>
  </div>

  <iframe id="app-frame" title="EstateMatch"
    allow="clipboard-write; forms"
    onload="document.getElementById('loader').classList.add('hide')"></iframe>

  <script>
    // Gán nguồn iframe = link Apps Script
    document.getElementById('app-frame').src = APPS_SCRIPT_URL;
  </script>
</body>
</html>
